<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DXF Planner — Visualizador Industrial</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- Topbar -->
    <header id="topbar">
      <div id="logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="3" width="7" height="7" stroke="#4fc3f7" stroke-width="1.5"/>
          <rect x="14" y="3" width="7" height="7" stroke="#4fc3f7" stroke-width="1.5"/>
          <rect x="3" y="14" width="7" height="7" stroke="#4fc3f7" stroke-width="1.5"/>
          <line x1="17.5" y1="14" x2="17.5" y2="21" stroke="#81c784" stroke-width="1.5"/>
          <line x1="14" y1="17.5" x2="21" y2="17.5" stroke="#81c784" stroke-width="1.5"/>
        </svg>
        <span>DXF Planner</span>
      </div>
      <div id="system-status" class="system-status">
        <span class="status-dot pulsing"></span>
        <span class="status-text">CAD ENGINE ACTIVE</span>
      </div>

      <div id="file-controls">
        <label id="upload-btn" title="Cargar plano DXF (rápido, con asociación local automática)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          Cargar DXF
          <input type="file" id="file-input" accept=".dxf" />
        </label>

        <div class="export-dropdown" id="export-dropdown-container">
          <button id="export-btn" title="Exportar plano y rutas" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Exportar
            <span class="dropdown-arrow">▼</span>
          </button>
          <div class="export-dropdown-content" id="export-menu">
            <button id="export-png-btn">Exportar PNG (Transparente)</button>
            <button id="export-dxf-active-btn">Exportar DXF (Solo ruta activa)</button>
            <button id="export-dxf-all-btn">Exportar DXF (Todas las rutas)</button>
          </div>
        </div>
      </div>

      <div id="tool-status">
        <span id="coords-display">X: — Y: —</span>
        <span id="status-msg">Carga un archivo DXF para comenzar</span>
      </div>

      <div id="plan-info" style="display:none">
        <span id="plan-name"></span>
        <span id="plan-stats"></span>
      </div>
    </header>

    <!-- Main layout -->
    <div id="main-layout">

      <!-- Left panel: Tools -->
      <aside id="tool-panel">
        <div class="panel-section">
          <div class="panel-title">Vista</div>
          <button class="tool-btn active" data-tool="pan" title="Mover (H)">
            <svg viewBox="0 0 24 24"><path d="M5 9l-3 3 3 3M9 5l3-3 3 3M15 19l-3 3-3-3M19 9l3 3-3 3M12 12v.01"/><path d="M3 12h18M12 3v18"/></svg>
            <span>Pan</span>
          </button>
          <button class="tool-btn" data-tool="select" title="Seleccionar (S)">
            <svg viewBox="0 0 24 24"><path d="M4 4l7.07 17 2.51-7.39L21 11.07z"/></svg>
            <span>Seleccionar</span>
          </button>
          <button class="tool-btn" id="fit-btn" title="Ajustar vista (F)">
            <svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
            <span>Ajustar</span>
          </button>
        </div>

        <div class="panel-section">
          <div class="panel-title">Medir</div>
          <button class="tool-btn" data-tool="measure-dist" title="Medir distancia (D)">
            <svg viewBox="0 0 24 24"><path d="M3 17l4-4 4 4 4-8 4 4"/><line x1="3" y1="20" x2="21" y2="20"/></svg>
            <span>Distancia</span>
          </button>
          <button class="tool-btn" data-tool="measure-area" title="Medir área (A)">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6v6H9z"/></svg>
            <span>Área</span>
          </button>
        </div>

        <div class="panel-section">
          <div class="panel-title">Ruta</div>
          <button class="tool-btn" data-tool="route" title="Trazar ruta peatonal (R)">
            <svg viewBox="0 0 24 24"><path d="M3 12h4l3-9 4 18 3-9h4"/></svg>
            <span>Trazar</span>
          </button>
          <button class="tool-btn" data-tool="passage" title="Definir zona de paso (P)">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" stroke-dasharray="4 2"/><path d="M9 12h6M12 9v6"/></svg>
            <span>Zona paso</span>
          </button>
          <button class="tool-btn" data-tool="avoid" title="Definir zona a evitar (E)">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" stroke-dasharray="4 2"/><line x1="8" y1="8" x2="16" y2="16" stroke="currentColor" stroke-width="1.8"/><line x1="16" y1="8" x2="8" y2="16" stroke="currentColor" stroke-width="1.8"/></svg>
            <span>Zona evitar</span>
          </button>
          <button class="tool-btn" id="clear-route-btn" title="Limpiar ruta">
            <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
            <span>Limpiar</span>
          </button>
        </div>
      </aside>

      <!-- Canvas WebGL -->
      <div id="canvas-container">
        <canvas id="gl-canvas"></canvas>

        <!-- Drop zone overlay -->
        <div id="drop-zone">
          <div id="drop-content">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#4fc3f7" stroke-width="1">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            <p>Arrastra tu archivo DXF aquí</p>
            <small>o usa el botón "Cargar DXF"</small>
          </div>
        </div>

        <!-- Loading overlay -->
        <div id="loading-overlay" style="display:none">
          <div id="loading-content">
            <div id="spinner"></div>
            <p id="loading-text">Procesando plano...</p>
            <div id="loading-bar"><div id="loading-progress"></div></div>
          </div>
        </div>

        <!-- Measurement tooltip -->
        <div id="measure-tooltip" style="display:none"></div>

        <!-- Measure info -->
        <div id="measure-info" style="display:none">
          <div id="measure-info-content">
            <strong>Medición</strong>
            <div id="measure-details"></div>
          </div>
        </div>
      </div>

      <!-- Right panel: Layers -->
      <aside id="layers-panel">
        <div class="panel-title">Capas</div>
        <div id="layer-search-wrap">
          <input type="text" id="layer-search" placeholder="Buscar capa…" />
        </div>
        <div id="layers-list"></div>

        <div class="panel-title" style="margin-top:16px">Propiedades</div>
        <div id="properties-panel">
          <p class="empty-hint">Selecciona una entidad</p>
        </div>

        <div class="panel-title" style="margin-top:16px">Configuración Ruta</div>
        <div id="route-config-panel">
          <div class="route-config-row">
            <label for="route-clearance">Separación (m):</label>
            <input type="range" id="route-clearance" min="0" max="5" step="0.1" value="0.5">
            <span id="route-clearance-value">0.5</span>
          </div>
          <div class="route-config-row">
            <label for="route-width">Ancho de paso (m):</label>
            <input type="range" id="route-width" min="0.2" max="4" step="0.1" value="1.2">
            <span id="route-width-value">1.2</span>
          </div>
          <div class="route-config-row" style="flex-direction:row; align-items:center; gap:8px; margin-bottom:8px;">
            <input type="checkbox" id="route-optimize-order" style="cursor:pointer;">
            <label for="route-optimize-order" style="cursor:pointer; margin:0;">Optimizar por cercanía</label>
          </div>
          <div id="waypoint-list" style="max-height:150px;overflow-y:auto;margin:8px 0;"></div>
          <div style="display:flex;gap:6px;margin-top:8px;">
            <button id="calc-route-btn" class="tool-btn" style="flex:1">Calcular ruta</button>
            <button id="clear-route-btn" class="tool-btn" style="flex:1">Limpiar</button>
          </div>
          <div id="route-comparison-panel" style="display:none; margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px;">
            <div style="font-size: 11px; color: var(--text-dim); font-weight: 500; margin-bottom: 6px;">Modelos de Ruta</div>
            <div id="route-models-list" class="route-models-list"></div>
          </div>

          <div style="margin-top:12px;border-top:1px solid var(--border);padding-top:12px;">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
              <span style="font-size:11px;color:var(--text-dim);font-weight:500;">Zonas de paso</span>
              <button id="clear-zones-btn" class="tool-btn" style="width:auto;padding:3px 8px;font-size:10px;">Limpiar</button>
            </div>
            <div id="zone-list" style="max-height:100px;overflow-y:auto;"></div>
          </div>

          <div style="margin-top:12px;border-top:1px solid var(--border);padding-top:12px;">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
              <span style="font-size:11px;color:var(--text-dim);font-weight:500;">Zonas a evitar</span>
              <button id="clear-avoid-btn" class="tool-btn" style="width:auto;padding:3px 8px;font-size:10px;">Limpiar</button>
            </div>
            <div id="avoid-list" style="max-height:100px;overflow-y:auto;"></div>
          </div>
        </div>
      </aside>

    </div>
  </div>

  <script src="app.js?v=5" type="module"></script>
</body>
</html>
